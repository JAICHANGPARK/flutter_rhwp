name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.44.0"
  FLUTTER_RUST_BRIDGE_VERSION: "2.11.1"
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Rust and Dart checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          rustc --version
          cargo --version
          flutter --version

      - name: Rust tests
        run: cargo test --manifest-path rust/Cargo.toml

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter tests
        run: flutter test

      - name: Example tests
        working-directory: example
        run: flutter test

  web:
    name: Web WASM build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install nightly rust-src
        run: |
          rustup toolchain install nightly --component rust-src
          rustup target add wasm32-unknown-unknown --toolchain nightly

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache cargo installs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-pack
            ~/.cargo/bin/flutter_rust_bridge_codegen
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-web-${{ runner.os }}-${{ env.FLUTTER_RUST_BRIDGE_VERSION }}-${{ hashFiles('rust/Cargo.lock') }}

      - name: Install Web build tools
        run: |
          if ! command -v wasm-pack >/dev/null; then
            cargo install wasm-pack --version 0.15.0 --locked
          fi
          if ! command -v flutter_rust_bridge_codegen >/dev/null; then
            cargo install flutter_rust_bridge_codegen --version "$FLUTTER_RUST_BRIDGE_VERSION" --locked
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Example Web widget tests
        working-directory: example
        run: flutter test --platform chrome test/widget_test.dart

      - name: Build FRB WASM bundle
        run: |
          flutter_rust_bridge_codegen build-web \
            --dart-root . \
            --rust-root rust \
            -o "$PWD/example/web"

      - name: Build example Web app
        working-directory: example
        run: flutter build web

  desktop:
    name: Desktop build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            build-command: flutter build linux --debug
          - platform: macos
            os: macos-latest
            build-command: flutter build macos --debug
          - platform: windows
            os: windows-latest
            build-command: flutter build windows --debug

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev xvfb

      - name: Enable desktop target
        run: flutter config --enable-${{ matrix.platform }}-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build example desktop app
        working-directory: example
        run: ${{ matrix.build-command }}

      - name: Run example integration workflow
        if: matrix.platform == 'linux'
        working-directory: example
        run: xvfb-run -a flutter test integration_test -d linux

      - name: Run example integration workflow on macOS
        if: matrix.platform == 'macos'
        working-directory: example
        run: flutter test integration_test/asset_workflow_test.dart -d macos

      - name: Run example integration workflow on Windows
        if: matrix.platform == 'windows'
        working-directory: example
        run: flutter test integration_test/asset_workflow_test.dart -d windows

  mobile:
    name: Mobile build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            rust-targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
            build-command: flutter build apk --debug
          - platform: ios
            os: macos-latest
            rust-targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
            build-command: flutter build ios --debug --no-codesign

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Java for Android
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Enable KVM for Android emulator
        if: matrix.platform == 'android'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Flutter pub get
        run: flutter pub get

      - name: Build example mobile app
        working-directory: example
        run: ${{ matrix.build-command }}

      - name: Run example integration workflow on Android
        if: matrix.platform == 'android'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          working-directory: example
          script: flutter test integration_test/asset_workflow_test.dart -d emulator-5554

      - name: Run example integration workflow on iOS simulator
        if: matrix.platform == 'ios'
        run: bash tool/ci_run_ios_integration.sh
